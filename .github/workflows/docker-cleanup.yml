on:
  workflow_dispatch:
    

jobs:
  delete-package-versions:
    name: Delete untagged package versions
    runs-on: ubuntu-latest
    steps:
      - uses: snok/container-retention-policy@v3.0.0
        with:
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: "radicale"
          image-tags: "nightly-*"
          cut-off: 30d
          dry-run: true
